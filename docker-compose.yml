services:
  social-downloader:
    image: ghcr.io/nikolainyegaard/social-downloader:latest
    container_name: social-downloader
    restart: unless-stopped

    volumes:
      # Database and cookies.txt are stored here - back this up.
      - ./data:/app/data
      # Downloaded media (videos, photos) are stored here.
      - ./media:/app/media

    environment:
      TZ: "Europe/Oslo"                           # set your timezone so log timestamps are in local time
      # Loop intervals are configurable from Settings in the UI and do not need to be set here.
      # WEB_PORT: "5000"         # change if needed (also update the ports below)
      # MEDIA_DIR: /app/media  # override media storage path inside the container

    # Bind only to localhost so Caddy (running on the host) can reach the service
    # but it is not directly exposed to the internet.
    #
    # Caddyfile reverse_proxy entry:
    #   reverse_proxy localhost:5000
    #
    # If Caddy is also a Docker container on the same host, put both services on
    # a shared network instead and reference the service name as the upstream:
    #   reverse_proxy social-downloader:5000
    # Then remove the `ports` block below and use `expose` instead.
    ports:
      - "127.0.0.1:5000:5000"
